{% extends "remainderapp/base.html" %}

{% block content %}
<div class="container py-5" style="background: linear-gradient(135deg, #eaf2f8, #f5f7fa); min-height: 100vh;">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 rounded-5 p-5" style="background-color: #ffffff;">

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show mb-4" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                
                <h3 class="card-title text-center mb-4 fw-bold" style="color: #4b4b4b;">Welcome Back</h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold" style="color: #6c6c6c;">Username</label>
                        <input type="text" id="username" name="username" class="form-control form-control-lg" placeholder="Enter username" required
                               style="border-radius: 0.5rem; border: 1px solid #d1d5db; background-color: #f9fafb; color: #333;">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold" style="color: #6c6c6c;">Password</label>
                        <input type="password" id="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required
                               style="border-radius: 0.5rem; border: 1px solid #d1d5db; background-color: #f9fafb; color: #333;">
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-lg fw-bold" 
                                style="background: #a3bfa8; color: #fff; border-radius: 0.5rem; transition: 0.3s;">
                            Login
                        </button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <p class="mb-2" style="color: #777;">New User?</p>
                    <a href="{% url 'remainderapp:register' %}" class="btn btn-outline-secondary fw-bold" 
                       style="border-radius: 0.5rem; border-color: #a3bfa8; color: #a3bfa8;">
                        Register Here
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
